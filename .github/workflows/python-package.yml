name: Python package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  minimal-install-smoke:
    name: "Minimal install smoke test"
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.11"
        os:
          - "ubuntu-latest"
    runs-on: "${{ matrix.os }}"
    defaults:
      run:
        shell: "bash -l {0}"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v4"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build package artifacts
        run: uv build

      - name: Create isolated virtual environment
        run: uv venv .venv-smoke

      - name: Install built wheel without extras
        run: uv pip install --python .venv-smoke/bin/python dist/*.whl

      - name: Smoke test package import
        run: |
          .venv-smoke/bin/python - <<'PY'
          import milliontrees
          from milliontrees.datasets.TreeBoxes import TreeBoxesDataset

          assert milliontrees.__version__
          assert TreeBoxesDataset
          print("Minimal install smoke test passed.")
          PY

  ci:
    name: "CI setup"
    needs: minimal-install-smoke

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.11"
        os:
          - "ubuntu-latest"

    runs-on: "${{ matrix.os }}"

    # use bash everywhere
    defaults:
      run:
        shell: "bash -l {0}"

    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v4"

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev pandoc

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          uv sync --all-extras --dev
          uv pip install nbqa

      - name: Verify nbqa installation
        run: uv run nbqa --version

      - name: Run pytest for everything but release
        run: uv run pytest -v --ignore-glob="*release*"

      - name: Check style
        run: uv run yapf -d --recursive src/milliontrees/ --style=.style.yapf

      # - name: Check notebook build
      #   run: uv run pytest --nbmake docs/*.ipynb

      - name: Run docformatter
        run: uv run docformatter --check --wrap-summaries 100 --wrap-descriptions 100 --recursive src/milliontrees/

      - name: Test Docs
        run: |
          cd docs && make clean && make html SPHINXOPTS="-W"
      
      - name: Test and check build artifacts
        run: |
          uv pip install build && uv run python -m build && uv run twine check dist/*
